name: Kernel v2 Phase 2 Plus2 Smoke

on:
  push:
    branches:
      - v1.2-execution-engine
  pull_request:
    branches:
      - main
      - v1.2-execution-engine
  workflow_dispatch:

jobs:
  smoke-plus2:
    name: Run kernel v2 phase 2 plus2 smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run kernel v2 preflight plus2
        run: python scripts/kernel_v2_preflight_plus2.py

      - name: Run kernel v2 foundation guard plus2
        run: python scripts/kernel_v2_foundation_guard_plus2.py

      - name: Run phase 2 plus2 smoke suite
        run: python scripts/kernel_v2_phase2_plus2_smoke.py
