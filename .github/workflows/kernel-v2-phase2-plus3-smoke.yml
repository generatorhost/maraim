name: Kernel v2 Phase 2 Plus3 Smoke

on:
  push:
    branches:
      - v1.2-execution-engine
  workflow_dispatch:

jobs:
  smoke-plus3:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/kernel_v2_foundation_guard_plus3.py
      - run: python scripts/kernel_v2_phase2_plus3_smoke.py
