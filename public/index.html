<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>maraim Kernel</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
:root{--bg:#090b12;--panel:#141827;--line:#29304a;--txt:#f4f5ff;--muted:#98a0bd;--blue:#4c8dff}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:Segoe UI,Tahoma,Arial,sans-serif;display:flex;height:100vh}
aside{width:250px;background:#0d101b;border-left:1px solid var(--line);padding:18px}
.logo{font-size:28px;font-weight:900}.logo small{display:block;color:var(--muted);font-size:12px}
.nav{padding:13px;border-radius:12px;cursor:pointer;margin-top:8px}.nav:hover,.nav.active{background:#1a2035}
main{flex:1;overflow:auto;padding:24px}.page{display:none}.page.active{display:block}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
button{background:var(--blue);color:white;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}
pre{white-space:pre-wrap;background:#0b0e18;border:1px solid var(--line);border-radius:12px;padding:12px;max-height:420px;overflow:auto}
</style>
</head>
<body>
<aside>
 <div class="logo">maraim <small>AI Freelance Worker Kernel</small></div>
 <div class="nav active" data-page="dashboard">?? Dashboard</div>
 <div class="nav" data-page="kernel">?? Kernel</div>
 <div class="nav" data-page="org">?? Organization</div>
 <div class="nav" data-page="scheduler">?? Scheduler</div>
 <div class="nav" data-page="memory">?? Memory</div>
 <div class="nav" data-page="workflow">?? Workflows</div>
 <div class="nav" data-page="mcp">?? MCP</div>
 <div class="nav" data-page="raw">?? Raw Status</div>
</aside>
<main>
 <div class="page active" id="dashboard"><h1>Dashboard</h1><button onclick="loadAll()">?????</button><div id="dash" class="grid"></div></div>
 <div class="page" id="kernel"><h1>Kernel</h1><div id="kernelBox"></div></div>
 <div class="page" id="org"><h1>Chief / Teams / Agents</h1><pre id="orgBox"></pre></div>
 <div class="page" id="scheduler"><h1>Scheduler</h1><button onclick="runNextTask()">Run Next Task</button><pre id="schedulerBox"></pre><pre id="lastTaskBox"></pre></div>
 <div class="page" id="memory"><h1>Memory</h1><pre id="memoryBox"></pre></div>
 <div class="page" id="workflow"><h1>Workflows</h1><button onclick="runWorkflow()">????? Project Acquisition</button><pre id="workflowBox"></pre></div>
 <div class="page" id="mcp"><h1>MCP</h1><pre id="mcpBox"></pre></div>
 <div class="page" id="raw"><h1>Raw Kernel Status</h1><pre id="rawBox"></pre></div>
</main>
<script>
const $=id=>document.getElementById(id);
let K=null;
document.querySelectorAll('.nav').forEach(n=>n.onclick=()=>{document.querySelectorAll('.nav').forEach(x=>x.classList.remove('active'));n.classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));$(n.dataset.page).classList.add('active');});
async function api(p,o){let r=await fetch(p,o);return await r.json();}
function card(k,v){return `<div class="card"><h3>${k}</h3><div style="font-size:30px;font-weight:900">${v}</div></div>`}
async function loadAll(){
 K=await api('/api/kernel2/status');
 let r=K.registry_counts||{}, s=K.scheduler||{}, m=K.memory||{};
 $('dash').innerHTML=card('State',K.state)+card('Agents',r.agent||0)+card('Teams',r.team||0)+card('Chiefs',r.chief||0)+card('Workflows',r.workflow||0)+card('Queued',s.queued||0)+card('Working Memory',m.working||0)+card('Long Memory',m.long||0);
 $('kernelBox').innerHTML='<div class="grid">'+card('State',K.state)+card('Services',K.services.length)+card('Runtimes',Object.keys(K.runtimes||{}).length)+card('MCP Tools',(K.mcp_tools||[]).length)+'</div>';
 $('orgBox').textContent=JSON.stringify(K.organization,null,2);
 $('schedulerBox').textContent=JSON.stringify(K.scheduler,null,2);
 $('memoryBox').textContent=JSON.stringify(K.memory,null,2);
 $('mcpBox').textContent=JSON.stringify(K.mcp_tools,null,2);
 $('rawBox').textContent=JSON.stringify(K,null,2);
}
async function runNextTask(){
 let d=await api('/api/kernel2/run-next',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
 $('lastTaskBox').textContent=JSON.stringify(d,null,2);
 await loadAll();
}
async function runWorkflow(){
 let d=await api('/api/kernel2/workflow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workflow_id:'project-acquisition',source:'ui'})});
 $('workflowBox').textContent=JSON.stringify(d,null,2);
 await loadAll();
}
loadAll();
</script>
</body>
</html>
